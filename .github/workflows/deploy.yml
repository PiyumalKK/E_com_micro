          docker tag ${{ secrets.ACR_NAME }}.azurecr.io/user-service:${{ github.sha }} ${{ secrets.ACR_NAME }}.azurecr.io/user-service:latest
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/user-service:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/user-service:latest

  deploy-user-service:
    if: ${{ github.event.inputs.user-service == 'true' && github.event.inputs.skip-deploy != 'true' }}
    needs: build-user-service
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: user-service
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/user-service:${{ github.sha }}

  # ==================== PRODUCT SERVICE ====================
  test-product-service:
    if: ${{ github.event.inputs.product-service == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
