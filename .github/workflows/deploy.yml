name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      api-gateway:
        description: '🚀 API Gateway'
        type: boolean
        default: false
      frontend:
        description: '🌐 Frontend'
        type: boolean
        default: false
      user-service:
        description: '👤 User Service'
        type: boolean
        default: false
      product-service:
        description: '📦 Product Service'
        type: boolean
        default: false
      order-service:
        description: '🛒 Order Service'
        type: boolean
        default: false
      notification-service:
        description: '🔔 Notification Service'
        type: boolean
        default: false
      skip-deploy:
        description: '⏭️ Skip build & deploy (tests + scans only)'
        type: boolean
        default: false

jobs:
  # ==================== API GATEWAY ====================
  test-api-gateway:
    if: ${{ github.event.inputs.api-gateway == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-gateway/package-lock.json
      - run: cd api-gateway && npm ci && npm test

  snyk-api-gateway:
    if: ${{ github.event.inputs.api-gateway == 'true' }}
    needs: test-api-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd api-gateway && npm install
      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=api-gateway/package.json

  sonar-api-gateway:
    if: ${{ github.event.inputs.api-gateway == 'true' }}
    needs: test-api-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-api-gateway:
    if: ${{ github.event.inputs.api-gateway == 'true' && github.event.inputs.skip-deploy != 'true' }}
    needs: [snyk-api-gateway, sonar-api-gateway]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - run: |
          cd api-gateway
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/api-gateway:${{ github.sha }} .
          docker tag ${{ secrets.ACR_NAME }}.azurecr.io/api-gateway:${{ github.sha }} ${{ secrets.ACR_NAME }}.azurecr.io/api-gateway:latest
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/api-gateway:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/api-gateway:latest

  deploy-api-gateway:
    if: ${{ github.event.inputs.api-gateway == 'true' && github.event.inputs.skip-deploy != 'true' }}
    needs: build-api-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: api-gateway
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/api-gateway:${{ github.sha }}

  # ==================== FRONTEND ====================
  test-frontend:
    if: ${{ github.event.inputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci && npm run build

  snyk-frontend:
    if: ${{ github.event.inputs.frontend == 'true' }}
    needs: test-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm install
      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/package.json

  sonar-frontend:
    if: ${{ github.event.inputs.frontend == 'true' }}
    needs: test-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-frontend:
    if: ${{ github.event.inputs.frontend == 'true' && github.event.inputs.skip-deploy != 'true' }}
    needs: [snyk-frontend, sonar-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - run: |
          cd frontend
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} .
          docker tag ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }} ${{ secrets.ACR_NAME }}.azurecr.io/frontend:latest
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/frontend:latest

  deploy-frontend:
    if: ${{ github.event.inputs.frontend == 'true' && github.event.inputs.skip-deploy != 'true' }}
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: frontend
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}

  # ==================== USER SERVICE ====================
  test-user-service:
    if: ${{ github.event.inputs.user-service == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-service/package-lock.json
      - run: cd user-service && npm ci && npm test

  snyk-user-service:
