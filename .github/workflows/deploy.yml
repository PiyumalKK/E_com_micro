name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Select service to deploy'
        required: true
        type: choice
        options:
          - api-gateway
          - frontend
          - user-service
          - product-service
          - order-service
          - notification-service
      skip-deploy:
        description: 'Skip build & deploy (run tests + scans only)'
        required: false
        type: boolean
        default: false

env:
  SERVICE_NAME: ${{ github.event.inputs.service }}
  CONTAINER_APP_NAME: ${{ github.event.inputs.service }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ github.event.inputs.service }}/package-lock.json
      - name: Install dependencies
        working-directory: ./${{ github.event.inputs.service }}
        run: npm ci
      - name: Run tests / build
        working-directory: ./${{ github.event.inputs.service }}
        run: |
          if [ "${{ github.event.inputs.service }}" = "frontend" ]; then
            npm run build
          else
            npm test
          fi

  snyk-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ./${{ github.event.inputs.service }}
        run: npm install
      - name: Run Snyk vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=${{ github.event.inputs.service }}/package.json

  sonar-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, snyk-scan, sonar-scan]
    if: ${{ github.event.inputs.skip-deploy != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push Docker image
        working-directory: ./${{ github.event.inputs.service }}
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker tag ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.SERVICE_NAME }}:${{ github.sha }} ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.SERVICE_NAME }}:latest
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.SERVICE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event.inputs.skip-deploy != 'true' }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.SERVICE_NAME }}:${{ github.sha }}
